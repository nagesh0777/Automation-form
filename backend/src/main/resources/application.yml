spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/podstatus}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-512-bit-secret-replace-this-with-512-bit-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  template:
    docx-path: ${DOCX_TEMPLATE_PATH:templates/Daily_Status_Template_1.docx}

logging:
  level:
    org.springframework.security: INFO
