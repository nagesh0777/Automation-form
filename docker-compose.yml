version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: podstatus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/podstatus
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: replace-this-with-512-bit-secret-replace-this-with-512-bit-secret
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
